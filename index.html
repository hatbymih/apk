<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="cas1Wesgy9Ozt6VueSKIYdZtp3dKtM_hBZnszSaWgzU" />

    <meta name="description" content="Aplikasi kalkulator iphone untuk anda dibuat oleh Onck. Hitung cepat dengan mudah di sini!">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kalkulator">
    <link rel="apple-touch-icon" href="https://help.apple.com/assets/67DB4A443E933AA73E0B736E/67DB4A441BBBD795C80FED6E/en_US/d7683090881be82d88efa4ac1d3aec74.png">

    <script type="application/ld+json">
{
  "@context": "https://schema.org",

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kalkulator - Onck</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            touch-action: none;
        }

        body {
            background-color: #000000;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .kalkulator {
            background-color: none;
            width: 100%;
            max-width: 450px; 
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 24px;
            padding-bottom: calc(env(safe-area-inset-bottom, 24px) + 50px);
            justify-content: flex-end;
        }

        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 10px;
            overflow: hidden;
            position: relative;
        }

        #history {
            color: #888;
            font-size: 1.8rem;
            min-height: 2.2rem;
            text-align: right;
            font-weight: 500;
            white-space: nowrap;
            width: 100%;
            opacity: 0;
            transform-origin: right bottom;
            transition: opacity 0.2s ease;
            word-spacing: 0.4rem; 
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            touch-action: pan-x;
            -webkit-overflow-scrolling: touch;
        }
        #history::-webkit-scrollbar { display: none; }

        #history.show { opacity: 1; }

        #layar {
            color: white;
            font-size: 6rem;
            text-align: right;
            width: 100%;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            display: inline-block;
            direction: ltr;
            transform-origin: right bottom;
            outline: none;
            touch-action: pan-x;
            -webkit-overflow-scrolling: touch;
            word-spacing: 0.6rem;
            letter-spacing: 0.02rem;
            font-weight: 500;
            position: relative;
        }
        
        #layar::-webkit-scrollbar { display: none; }

        .history-anim {
            animation: moveUpHistory 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes moveUpHistory {
            0% { transform: translateY(60px) scale(2.5); opacity: 1; color: white; }
            100% { transform: translateY(0) scale(1); opacity: 1; color: #888; }
        }

        .result-anim {
            animation: zoomInResult 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes zoomInResult {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .grid-tombol {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            row-gap: 20px;
            column-gap: 14px; 
            margin-top: 10px;
            flex-shrink: 0;
            width: 100%;
        }

        button {
            width: 100%;
            aspect-ratio: 1 / 1; 
            border: none;
            border-radius: 50%;
            font-size: 2.3rem; 
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.05s;
        }

        @media (max-height: 580px) {
            .kalkulator {
                max-width: 100%;
                padding: 10px 16px;
                padding-bottom: calc(env(safe-area-inset-bottom, 10px) + 35px); 
            }
            .grid-tombol {
                row-gap: 16px;
                column-gap: 12px; 
            }
            button {
                aspect-ratio: 1 / 1; 
                height: clamp(45px, 11dvh, 65px); 
                width: auto;
                margin: 0 auto;
                font-size: 1.8rem;
            }
            .btn-oranye {
                font-size: 2.2rem !important;
            }
            #layar {
                font-size: 4rem;
            }
            #history {
                font-size: 1.5rem;
            }
            .backspace-icon {
                width: 26px !important;
                height: 26px !important;
            }
        }

        button.is-pressed { 
            filter: brightness(1.5); 
            transform: scale(0.94); 
        }

        .btn-abu-tua { background-color: #333333; color: white; }
        .btn-abu-muda { background-color: #505050; color: white; }
        .btn-fungsi-atas { background-color: #505050; color: white; }
        .btn-oranye { background-color: #FF9F0A; color: white; font-size: 2.6rem; }
        .op-aktif { background-color: white !important; color: #FF9F0A !important; }

        .backspace-icon { width: 34px; height: 34px; fill: none; stroke: currentColor; stroke-width: 1.25; pointer-events: none; }
    </style>
</head>
<body>

    <div class="kalkulator">
        <div class="display-container">
            <div id="history"></div>
            <div id="layar" tabindex="-1"></div>
        </div>
        
        <div class="grid-tombol">
            <button class="btn-fungsi-atas" data-action="backspace">
                <svg class="backspace-icon" viewBox="0 0 24 24"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
            </button>
            <button class="btn-fungsi-atas" id="btn-ac" data-action="clear">AC</button>
            <button class="btn-fungsi-atas" data-action="persen">%</button>
            <button class="btn-oranye operator" id="op-div" data-action="operator" data-val="/">÷</button>

            <button class="btn-abu-tua" data-action="input" data-val="7">7</button>
            <button class="btn-abu-tua" data-action="input" data-val="8">8</button>
            <button class="btn-abu-tua" data-action="input" data-val="9">9</button>
            <button class="btn-oranye operator" id="op-mul" data-action="operator" data-val="*">×</button>

            <button class="btn-abu-tua" data-action="input" data-val="4">4</button>
            <button class="btn-abu-tua" data-action="input" data-val="5">5</button>
            <button class="btn-abu-tua" data-action="input" data-val="6">6</button>
            <button class="btn-oranye operator" id="op-sub" data-action="operator" data-val="-">−</button>

            <button class="btn-abu-tua" data-action="input" data-val="1">1</button>
            <button class="btn-abu-tua" data-action="input" data-val="2">2</button>
            <button class="btn-abu-tua" data-action="input" data-val="3">3</button>
            <button class="btn-oranye operator" id="op-add" data-action="operator" data-val="+">+</button>

            <button class="btn-abu-tua" data-action="toggleMinus">+/-</button>
            <button class="btn-abu-tua" data-action="input" data-val="0">0</button>
            <button class="btn-abu-tua" data-action="input" data-val=",">,</button>
            <button class="btn-oranye" data-action="hitung">=</button>
        </div>
    </div>

    <script>
        const layar = document.getElementById('layar');
        const historyEl = document.getElementById('history');
        const btnAC = document.getElementById('btn-ac');
        
        let currentInput = ""; 
        let expression = "";
        let lastExpressionBeforeResult = ""; 
        let isFinalResult = false;

        let backspaceTimeout = null;
        let backspaceInterval = null;
        let isLongPressingBackspace = false; 

        function formatNumber(numStr) {
            if (!numStr || numStr === "Error" || numStr === "-") return numStr;
            let parts = numStr.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            return parts.length > 1 ? parts[0] + ',' + parts[1] : parts[0];
        }

        // ... (Fungsi logika kalkulator tetap dipertahankan persis sama)
        function formatExpression(exp) {
            return exp.replace(/(\d+(\.\d+)?)/g, (match) => formatNumber(match))
                      .replace(/\*/g, '×')
                      .replace(/\//g, '÷')
                      .replace(/\+/g, '+')
                      .replace(/\-/g, '−');
        }

        function updateDisplay() {
            let visualCurrent = formatNumber(currentInput);
            let visualExp = formatExpression(expression);
            let displayContent = visualExp + visualCurrent;

            layar.innerHTML = displayContent;
            adjustFontSize();
            
            layar.scrollLeft = layar.scrollWidth;
            historyEl.scrollLeft = historyEl.scrollWidth;

            btnAC.innerText = (currentInput !== "" || expression !== "") ? "C" : "AC";

            if (isLongPressingBackspace) {
                resetOperatorHighlight();
                return; 
            }

            if (currentInput === "-") {
                highlightOperator('-');
            } else if (expression !== "" && currentInput === "") {
                highlightOperator(expression.slice(-1));
            } else {
                resetOperatorHighlight();
            }
        }

        function adjustFontSize() {
            let maxFontSize = window.innerHeight <= 580 ? 4.0 : 6.0; 
            let minFontSize = 1.8; 
            layar.style.fontSize = maxFontSize + "rem";
            
            while (layar.scrollWidth > layar.clientWidth && maxFontSize > minFontSize) {
                maxFontSize -= 0.2;
                if (maxFontSize < minFontSize) maxFontSize = minFontSize;
                layar.style.fontSize = maxFontSize + "rem";
            }
        }

        function handleInput(digit) {
            if (isFinalResult) handleClear();

            if (digit === '0' && currentInput === '0') return;
            if (digit === ',') {
                if (currentInput === "" || currentInput === "-") currentInput += "0.";
                else if (!currentInput.includes('.')) currentInput += ".";
            } else {
                if (currentInput === "0") currentInput = digit;
                else currentInput += digit;
            }
            updateDisplay();
        }

        function handleOperator(op) {
            if (isFinalResult) {
                let res = currentInput;
                handleClear();
                currentInput = res;
            }

            if (currentInput.endsWith('.')) {
                currentInput = currentInput.slice(0, -1);
            }

            if (currentInput === "" || currentInput === "-") {
                if (expression !== "") {
                    expression = expression.slice(0, -1) + op;
                    currentInput = ""; 
                }
                updateDisplay();
                return;
            }

            expression += currentInput + op;
            currentInput = "";
            updateDisplay();
        }

        function handlePersen() {
            if (isFinalResult) return;
            if (currentInput === "" || currentInput === "-") return;
            if (!currentInput.includes('%')) {
                currentInput += "%";
                updateDisplay();
            }
        }

        function handleHitung() {
            if (isFinalResult || (expression === "" && currentInput !== "-")) return;
            let finalExpression = expression + currentInput;
            if (/[\+\-\*\/]$/.test(finalExpression) || finalExpression === "-") return;

            lastExpressionBeforeResult = finalExpression;

            try {
                let evalExp = finalExpression;
                evalExp = evalExp.replace(/(\d+(?:\.\d+)?)%?([\+\-])(\d+(?:\.\d+)?)%/g, "($1$2($1*$3/100))");
                evalExp = evalExp.replace(/(\d+(?:\.\d+)?)%/g, "($1/100)");
                
                let result = new Function('return ' + evalExp)();
                
                historyEl.innerText = formatExpression(finalExpression);
                historyEl.classList.remove('history-anim', 'show');
                layar.classList.remove('result-anim');
                void historyEl.offsetWidth; 
                historyEl.classList.add('history-anim', 'show');
                layar.classList.add('result-anim');

                if (Math.abs(result) < 1e-10) result = 0;
                let resultStr = Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(10)).toString();
                
                currentInput = resultStr;
                expression = "";
                isFinalResult = true;
                
                updateDisplay();
            } catch (e) { currentInput = "Error"; updateDisplay(); }
        }

        function handleClear() {
            currentInput = "";
            expression = "";
            lastExpressionBeforeResult = ""; 
            isFinalResult = false;
            
            layar.innerText = ""; 
            historyEl.innerText = "";
            historyEl.classList.remove('show', 'history-anim');
            layar.classList.remove('result-anim');
            updateDisplay();
        }

        function handleBackspace() {
            if (isFinalResult && lastExpressionBeforeResult !== "") {
                let fullExp = lastExpressionBeforeResult;
                let match = fullExp.match(/^(.*?)(\d+(\.\d+)?%?)$/);
                if (match) {
                    expression = match[1];
                    currentInput = match[2];
                } else {
                    currentInput = fullExp;
                    expression = "";
                }
                isFinalResult = false;
                lastExpressionBeforeResult = "";
                historyEl.innerText = "";
                historyEl.classList.remove('show', 'history-anim');
                layar.classList.remove('result-anim');
                updateDisplay();
                return;
            }

            if (currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
            } else if (expression.length > 0) {
                expression = expression.slice(0, -1) + '';
                let match = expression.match(/(\d+(\.\d+)?%?)$/);
                if (match) {
                    currentInput = match[0];
                    expression = expression.slice(0, -match[0].length);
                }
            }
            updateDisplay();
        }

        function stopBackspaceRepetition() {
            if (backspaceTimeout) { clearTimeout(backspaceTimeout); backspaceTimeout = null; }
            if (backspaceInterval) { clearInterval(backspaceInterval); backspaceInterval = null; }
            
            if (isLongPressingBackspace) {
                isLongPressingBackspace = false;
                if (currentInput === "-") {
                    highlightOperator('-');
                } else if (expression !== "" && currentInput === "") {
                    highlightOperator(expression.slice(-1));
                } else {
                    resetOperatorHighlight();
                }
            }
        }

        function handleToggleMinus() {
            if (isFinalResult) return;
            if (currentInput === "" || currentInput === "-") return;

            if (currentInput.startsWith("-")) currentInput = currentInput.slice(1);
            else currentInput = "-" + currentInput;
            updateDisplay();
        }

        function highlightOperator(op) {
            resetOperatorHighlight();
            const idMap = {'+': 'op-add', '-': 'op-sub', '*': 'op-mul', '/': 'op-div'};
            if (idMap[op]) document.getElementById(idMap[op]).classList.add('op-aktif');
        }

        function resetOperatorHighlight() {
            document.querySelectorAll('.operator').forEach(el => el.classList.remove('op-aktif'));
        }

        const buttons = document.querySelectorAll('button');
        const activeTouches = new Map();

        buttons.forEach(btn => {
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                btn.releasePointerCapture(e.pointerId);
                btn.classList.add('is-pressed');
                activeTouches.set(e.pointerId, btn);
                
                const action = btn.getAttribute('data-action');
                const val = btn.getAttribute('data-val');

                if (action === 'input') handleInput(val);
                else if (action === 'operator') handleOperator(val);
                else if (action === 'clear') handleClear();
                else if (action === 'backspace') {
                    handleBackspace();
                    stopBackspaceRepetition();
                    
                    backspaceTimeout = setTimeout(() => {
                        isLongPressingBackspace = true; 
                        resetOperatorHighlight(); 
                        backspaceInterval = setInterval(() => {
                            handleBackspace();
                        }, 80);
                    }, 500);
                }
                else if (action === 'persen') handlePersen();
                else if (action === 'toggleMinus') handleToggleMinus();
                else if (action === 'hitung') handleHitung();
            });
        });

        window.addEventListener('pointerup', (e) => {
            const btn = activeTouches.get(e.pointerId);
            if (btn) {
                btn.classList.remove('is-pressed');
                activeTouches.delete(e.pointerId);
                if (btn.getAttribute('data-action') === 'backspace') {
                    stopBackspaceRepetition();
                }
            }
        });

        window.addEventListener('pointercancel', (e) => {
            stopBackspaceRepetition();
        });

        document.addEventListener('selectstart', (e) => e.preventDefault());
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        window.addEventListener('focusin', (e) => {
            if (e.target && typeof e.target.blur === 'function') {
                e.target.blur();
            }
        });

        const resizeObserver = new ResizeObserver(() => adjustFontSize());
        resizeObserver.observe(layar);

        // DIUBAH: Registrasi Service Worker eksternal (sw.js) asli demi kompatibilitas penuh PWA browser
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Service Worker Terdaftar! Scope:', reg.scope))
                    .catch(err => console.error('PWA Service Worker Gagal:', err));
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateDisplay();
        });
    </script>
</body>
</html>
